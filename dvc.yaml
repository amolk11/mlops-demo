stages:
  data_ingestion:
    cmd: python src/data_ingestion.py
    deps:
    - src/data_ingestion.py
    outs:
    - data/raw
  data_preprocessing:
    cmd: python src/data_preprocessing.py
    deps:
    - data/raw
    - src/data_preprocessing.py
    - src/missing_value_imputer.py
    outs:
    - data/processed
  feature_engineering:
    cmd: python src/feature_engineering.py
    deps:
    - data/processed
    - src/feature_engineering.py
    outs:
    - data/feature
  model_building:
    cmd: python src/model_building.py
    deps:
    - data/feature
    - src/model_building.py
    - params.yaml
    params:
    - model_building.learning_rate
    - model_building.n_estimators
    - model_building.num_leaves
    - model_building.min_child_samples
    - model_building.subsample
    - model_building.colsample_bytree
    - model_building.reg_alpha
    - model_building.reg_lambda
    - model_building.class_weight
    - model_building.random_state
    outs:
    - models/lightgbm_model.pkl
    - models/scaler.pkl

  model_evaluation:
    cmd: python src/model_evaluation.py
    deps:
    - models/lightgbm_model.pkl
    - models/scaler.pkl
    - src/model_evaluation.py
    - data/feature
    - src/classification_evaluator.py
    outs:
    - reports/evaluation_report.json
